<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page is this</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            text-align: center;
        }
        header {
            background: #24292e;
            color: white;
            padding: 20px 0;
        }
        main {
            padding: 40px;
        }
        footer {
            margin-top: 40px;
            padding: 10px;
            background: #ddd;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My GitHub Page 🚀</h1>
</header>

<main>
    <h2>Hello!</h2>
    <p>This is my first GitHub Pages website.</p>

    <p>
        Check out my projects on 
        <a href="https://github.com/">GitHub</a>
    </p>

    <button onclick="showMessage()">Click Me</button>
</main>

<footer>
    <p>© 2026 My Website</p>
</footer>

<script>
    function showMessage() {
        alert("Thanks for visiting my site!");
    }
</script>

</body>
</html>
